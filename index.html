<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #fffde7, #ffe082);
    font-family: Arial, sans-serif;
}

/* TEXTO */
h1 {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    color: #4e342e;
}

/* RAMO */
.bouquet {
    position: relative;
    width: 250px;
    height: 350px;
}

/* TALLOS */
.stem {
    position: absolute;
    width: 4px;
    height: 150px;
    background: #2e7d32;
    bottom: 0;
    left: 50%;
    transform-origin: bottom;
}

/* POSICIONES TALLOS */
.s1 { transform: rotate(-25deg); }
.s2 { transform: rotate(-10deg); }
.s3 { transform: rotate(10deg); }
.s4 { transform: rotate(25deg); }
.s5 { transform: rotate(0deg); }

/* FLOR */
.flower {
    position: absolute;
    width: 80px;
    height: 80px;
}

/* CENTRO */
.center {
    position: absolute;
    width: 10px;
    height: 10px;
    background: orange;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* PÉTALOS LIRIO */
.petal {
    position: absolute;
    width: 20px;
    height: 60px;
    background: radial-gradient(circle at 50% 20%, #fffde7, #fdd835);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
}

/* 6 pétalos */
.petal:nth-child(1){ transform: rotate(0deg); }
.petal:nth-child(2){ transform: rotate(60deg); }
.petal:nth-child(3){ transform: rotate(120deg); }
.petal:nth-child(4){ transform: rotate(180deg); }
.petal:nth-child(5){ transform: rotate(240deg); }
.petal:nth-child(6){ transform: rotate(300deg); }

/* POSICIÓN DE FLORES */
.f1 { top: 0; left: 85px; }
.f2 { top: 60px; left: 10px; }
.f3 { top: 60px; left: 160px; }
.f4 { top: 130px; left: 50px; }
.f5 { top: 130px; left: 120px; }

/* ENVOLTURA */
.wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 150px;
    background: #ffe0b2;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
}
</style>
</head>

<body>

<h1>no quiero que te quedes sin nada<br>te amo mucho 💛</h1>

<div class="bouquet">

    <!-- TALLOS -->
    <div class="stem s1"></div>
    <div class="stem s2"></div>
    <div class="stem s3"></div>
    <div class="stem s4"></div>
    <div class="stem s5"></div>

    <!-- FLORES -->
    <div class="flower f1" id="f1"></div>
    <div class="flower f2" id="f2"></div>
    <div class="flower f3" id="f3"></div>
    <div class="flower f4" id="f4"></div>
    <div class="flower f5" id="f5"></div>

    <!-- ENVOLTURA -->
    <div class="wrap"></div>

</div>

<script>
function crearLirio(id){
    let flor = document.getElementById(id);

    for(let i=0;i<6;i++){
        let petalo = document.createElement("div");
        petalo.className="petal";
        flor.appendChild(petalo);
    }

    let centro = document.createElement("div");
    centro.className="center";
    flor.appendChild(centro);
}

["f1","f2","f3","f4","f5"].forEach(crearLirio);
</script>

</body>
</html>
