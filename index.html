<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #fffde7, #ffe082);
    font-family: Arial, sans-serif;
}

/* CONTENEDOR */
.container {
    text-align: center;
    position: relative;
}

/* TEXTO */
h1 {
    margin-bottom: 40px;
    color: #4e342e;
}

/* RAMO */
.bouquet {
    position: relative;
    width: 220px;
    height: 320px;
    margin: auto;
}

/* TALLOS */
.stem {
    position: absolute;
    width: 5px;
    height: 140px;
    background: #2e7d32;
    bottom: 0;
    left: 50%;
    transform-origin: bottom;
}

/* POSICIÓN TALLOS */
.s1 { transform: rotate(-15deg); }
.s2 { transform: rotate(-30deg); }
.s3 { transform: rotate(15deg); }
.s4 { transform: rotate(30deg); }
.s5 { transform: rotate(5deg); }

/* FLOR */
.flower {
    position: absolute;
    width: 70px;
    height: 70px;
}

/* CENTRO */
.center {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ff8f00;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* PÉTALOS DE LIRIO */
.petal {
    position: absolute;
    width: 18px;
    height: 50px;
    background: radial-gradient(circle at 50% 20%, #fffde7, #fdd835);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
}

/* ROTACIÓN LIRIO */
.petal:nth-child(1) { transform: rotate(0deg); }
.petal:nth-child(2) { transform: rotate(60deg); }
.petal:nth-child(3) { transform: rotate(120deg); }
.petal:nth-child(4) { transform: rotate(180deg); }
.petal:nth-child(5) { transform: rotate(240deg); }
.petal:nth-child(6) { transform: rotate(300deg); }

/* POSICIÓN FLORES */
.f1 { top: 0; left: 80px; }
.f2 { top: 50px; left: 20px; }
.f3 { top: 50px; left: 140px; }
.f4 { top: 110px; left: 60px; }
.f5 { top: 110px; left: 110px; }

/* ENVOLTURA */
.wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 140px;
    background: #ffe0b2;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    opacity: 0.95;
}
</style>
</head>

<body>

<div class="container">
    <h1>no quiero que te quedes sin nada<br>te amo mucho 💛</h1>

    <div class="bouquet">

        <!-- TALLOS -->
        <div class="stem s1"></div>
        <div class="stem s2"></div>
        <div class="stem s3"></div>
        <div class="stem s4"></div>
        <div class="stem s5"></div>

        <!-- FLORES -->
        <div class="flower f1" id="f1"></div>
        <div class="flower f2" id="f2"></div>
        <div class="flower f3" id="f3"></div>
        <div class="flower f4" id="f4"></div>
        <div class="flower f5" id="f5"></div>

        <!-- ENVOLTURA -->
        <div class="wrap"></div>

    </div>
</div>

<script>
function createLily(id){
    const flower = document.getElementById(id);

    for(let i=0;i<6;i++){
        let petal = document.createElement("div");
        petal.className="petal";
        flower.appendChild(petal);
    }

    let center = document.createElement("div");
    center.className="center";
    flower.appendChild(center);
}

["f1","f2","f3","f4","f5"].forEach(createLily);
</script>

</body>
</html>
