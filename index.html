<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #0f2027, #203a43);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

h1 {
    position: absolute;
    top: 8%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 2.3em;
}

/* RAMO */
.bouquet {
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* TALLOS */
.stem {
    stroke: #00e676;
    stroke-width: 4;
}

/* BRILLOS */
.sparkle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    animation: sparkle 3s infinite;
}

@keyframes sparkle {
    0% { opacity: 0; transform: translateY(0);}
    50% { opacity: 1;}
    100% { opacity: 0; transform: translateY(-40px);}
}
</style>
</head>

<body>

<h1>no quiero que te quedes sin nada<br>te amo mucho 💛</h1>

<svg class="bouquet" width="300" height="400" viewBox="0 0 300 400">

    <!-- TALLOS -->
    <line x1="150" y1="350" x2="100" y2="200" class="stem"/>
    <line x1="150" y1="350" x2="200" y2="200" class="stem"/>
    <line x1="150" y1="350" x2="150" y2="180" class="stem"/>

    <!-- 🌸 LIRIO 1 -->
    <g transform="translate(100,200)">
        <path d="M0,0 C20,-40 40,-40 60,0 C40,-20 20,-20 0,0" fill="white"/>
        <path d="M0,0 C-30,-30 -30,-10 0,20 C-10,0 -10,-10 0,0" fill="white"/>
        <path d="M60,0 C90,-30 90,-10 60,20 C70,0 70,-10 60,0" fill="white"/>
        <circle cx="30" cy="0" r="5" fill="orange"/>
    </g>

    <!-- 🌸 LIRIO 2 -->
    <g transform="translate(200,200)">
        <path d="M0,0 C20,-40 40,-40 60,0 C40,-20 20,-20 0,0" fill="white"/>
        <path d="M0,0 C-30,-30 -30,-10 0,20 C-10,0 -10,-10 0,0" fill="white"/>
        <path d="M60,0 C90,-30 90,-10 60,20 C70,0 70,-10 60,0" fill="white"/>
        <circle cx="30" cy="0" r="5" fill="orange"/>
    </g>

    <!-- 🌸 LIRIO 3 -->
    <g transform="translate(150,150)">
        <path d="M0,0 C20,-50 40,-50 60,0 C40,-25 20,-25 0,0" fill="white"/>
        <path d="M0,0 C-30,-30 -30,-10 0,20" fill="white"/>
        <path d="M60,0 C90,-30 90,-10 60,20" fill="white"/>
        <circle cx="30" cy="0" r="5" fill="orange"/>
    </g>

    <!-- ENVOLTURA -->
    <polygon points="80,250 220,250 150,380" fill="#ffab91"/>

</svg>

<script>
function sparkle(){
    const s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"vw";
    s.style.top=(60+Math.random()*30)+"vh";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),3000);
}
setInterval(sparkle,300);
</script>

</body>
</html>
