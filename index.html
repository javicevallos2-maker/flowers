<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #fff3c4, #ffd54f);
    font-family: 'Segoe UI', sans-serif;
}

/* TEXTO */
h1 {
    position: absolute;
    top: 10%;
    width: 100%;
    text-align: center;
    color: #4e342e;
    font-size: 2.2em;
}

/* RAMO */
.bouquet {
    position: relative;
    width: 260px;
    height: 360px;
}

/* TALLOS */
.stem {
    position: absolute;
    width: 5px;
    height: 160px;
    background: #1b5e20;
    bottom: 0;
    left: 50%;
    transform-origin: bottom;
}

/* POSICIÓN TALLOS */
.s1 { transform: rotate(-25deg); }
.s2 { transform: rotate(-10deg); }
.s3 { transform: rotate(0deg); }
.s4 { transform: rotate(10deg); }
.s5 { transform: rotate(25deg); }

/* FLOR */
.flower {
    position: absolute;
    width: 80px;
    height: 80px;
}

/* CENTRO */
.center {
    position: absolute;
    width: 14px;
    height: 14px;
    background: #ff6f00;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* PÉTALOS (AHORA MÁS VISIBLES) */
.petal {
    position: absolute;
    width: 22px;
    height: 60px;
    background: linear-gradient(to top, #f9a825, #fff176);
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
    box-shadow: 0 0 8px rgba(255, 200, 0, 0.6);
}

/* FORMA */
.petal:nth-child(1) { transform: rotate(0deg); }
.petal:nth-child(2) { transform: rotate(60deg); }
.petal:nth-child(3) { transform: rotate(120deg); }
.petal:nth-child(4) { transform: rotate(180deg); }
.petal:nth-child(5) { transform: rotate(240deg); }
.petal:nth-child(6) { transform: rotate(300deg); }

/* POSICIÓN FLORES */
.f1 { top: 0; left: 90px; }
.f2 { top: 60px; left: 10px; }
.f3 { top: 60px; left: 170px; }
.f4 { top: 130px; left: 60px; }
.f5 { top: 130px; left: 130px; }

/* ENVOLTURA */
.wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 160px;
    background: linear-gradient(to top, #ffab91, #ffe0b2);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* SOMBRA */
.shadow {
    position: absolute;
    bottom: -10px;
    width: 200px;
    height: 20px;
    background: rgba(0,0,0,0.2);
    border-radius: 50%;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>

<body>

<h1>no quiero que te quedes sin nada<br>te amo mucho 💛</h1>

<div class="bouquet">

    <div class="stem s1"></div>
    <div class="stem s2"></div>
    <div class="stem s3"></div>
    <div class="stem s4"></div>
    <div class="stem s5"></div>

    <div class="flower f1" id="f1"></div>
    <div class="flower f2" id="f2"></div>
    <div class="flower f3" id="f3"></div>
    <div class="flower f4" id="f4"></div>
    <div class="flower f5" id="f5"></div>

    <div class="wrap"></div>
    <div class="shadow"></div>

</div>

<script>
function createLily(id){
    const f = document.getElementById(id);

    for(let i=0;i<6;i++){
        let p = document.createElement("div");
        p.className="petal";
        f.appendChild(p);
    }

    let c = document.createElement("div");
    c.className="center";
    f.appendChild(c);
}

["f1","f2","f3","f4","f5"].forEach(createLily);
</script>

</body>
</html>
